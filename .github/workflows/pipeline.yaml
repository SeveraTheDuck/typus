name: Build & Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate matrix
        id: generate
        run: |
          matrix=$(find tests/pipelines -name '*.json' | \
            xargs jq -sc '
              [
                .[].tests[] |
                . as $entry |
                $entry.targets[] |
                . as $target |
                $entry.presets[] |
                . as $preset |
                ("clang", "gcc") |
                {
                  target:   $target,
                  preset:   $preset,
                  compiler: .
                }
              ]
            ')
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  build-and-test:
    name: ${{ matrix.compiler }} / ${{ matrix.preset }} / ${{ matrix.target }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Setup ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-${{ matrix.compiler }}-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.compiler }}-${{ matrix.preset }}-

      - name: Configure
        run: |
          nix develop .#${{ matrix.compiler }} --command bash -c "
            CCACHE_DIR=${{ github.workspace }}/.ccache \
            cmake --preset ${{ matrix.preset }}
          "

      - name: Build
        run: |
          nix develop .#${{ matrix.compiler }} --command bash -c "
            CCACHE_DIR=${{ github.workspace }}/.ccache \
            CCACHE_MAXSIZE=500M \
            cmake --build --preset ${{ matrix.preset }} --target ${{ matrix.target }} -j$(nproc)
          "

      - name: Test
        run: |
          nix develop .#${{ matrix.compiler }} --command \
            ctest --preset ${{ matrix.preset }} -L ${{ matrix.target }}
